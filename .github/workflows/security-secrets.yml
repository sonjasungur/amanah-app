name: Security secrets

on:
  pull_request:
  push:
    branches: [main]

permissions:
  contents: read

jobs:
  security-secrets:
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4.2.2
        with:
          fetch-depth: 0
      - name: Install gitleaks 8.24.3
        run: |
          set -euo pipefail
          curl -sSL -o /tmp/gitleaks.tgz "https://github.com/gitleaks/gitleaks/releases/download/v8.24.3/gitleaks_8.24.3_linux_x64.tar.gz"
          sudo tar -xzf /tmp/gitleaks.tgz -C /usr/local/bin gitleaks
          gitleaks version
      - name: Tracked sensitive files
        run: bash scripts/security/check-tracked-sensitive-files.sh
      - name: Gitleaks history (redacted)
        run: |
          if [ -f .gitleaksignore ]; then
            gitleaks detect --source . --config .gitleaks.toml --gitleaks-ignore-path .gitleaksignore --redact --no-banner --exit-code 1
          elif [ -f .gitleaks-baseline.json ]; then
            gitleaks detect --source . --config .gitleaks.toml --baseline-path .gitleaks-baseline.json --redact --no-banner --exit-code 1
          else
            gitleaks detect --source . --config .gitleaks.toml --redact --no-banner --exit-code 1
          fi
      - name: Policy files present
        run: |
          test -f SECURITY.md
          test -f AI_POLICY.md
          test -f docs/security/secret-rotation-runbook.md
          test -f docs/ai/ai-risk-register.md
