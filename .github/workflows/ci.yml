name: CI

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

permissions:
  contents: read

env:
  NEXT_TELEMETRY_DISABLED: "1"
  AMANAH_AI_PROVIDER: rules
  AI_PROVIDER: rules
  AMANAH_AI_ENABLED: "true"

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  quality:
    name: Lint, unit tests, and build
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: ESLint
        run: npm run lint

      - name: Unit tests
        run: npm test -- --run

      - name: Production build
        run: npm run build

  e2e:
    name: Playwright E2E – desktop and mobile
    needs: quality
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Install Playwright Chromium
        run: npx playwright install --with-deps chromium

      - name: Production build
        run: npm run build

      - name: Playwright E2E
        env:
          CI: "true"
          PLAYWRIGHT_PORT: "3099"
          NEXT_PUBLIC_APP_URL: "http://127.0.0.1:3099"
        run: npm run test:e2e

      - name: Upload Playwright failure artifacts
        if: failure() || cancelled()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-failure-${{ github.run_id }}-${{ github.run_attempt }}
          path: |
            playwright-report/
            test-results/
          if-no-files-found: ignore
          retention-days: 7
