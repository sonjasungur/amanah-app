# MSC security gates — repository-local; does not replace GitHub Actions
stages:
  - security

variables:
  GIT_DEPTH: "0"
  GITLEAKS_VERSION: "8.24.3"

tracked-sensitive-files:
  stage: security
  image: alpine:3.20.3
  before_script:
    - apk add --no-cache bash git
  script:
    - bash scripts/security/check-tracked-sensitive-files.sh

gitleaks-history:
  stage: security
  image:
    name: zricethezav/gitleaks:v8.24.3
    entrypoint: [""]
  variables:
    GIT_DEPTH: "0"
  script:
    - gitleaks version
    - |
      if [ -f .gitleaksignore ]; then
        gitleaks detect --source . --config .gitleaks.toml --gitleaks-ignore-path .gitleaksignore --redact --no-banner --exit-code 1
      elif [ -f .gitleaks-baseline.json ]; then
        gitleaks detect --source . --config .gitleaks.toml --baseline-path .gitleaks-baseline.json --redact --no-banner --exit-code 1
      else
        gitleaks detect --source . --config .gitleaks.toml --redact --no-banner --exit-code 1
      fi

security-policy-validation:
  stage: security
  image: alpine:3.20.3
  script:
    - test -f SECURITY.md
    - test -f AI_POLICY.md
    - test -f .gitleaks.toml
    - test -f docs/security/secret-rotation-runbook.md
    - test -f docs/ai/ai-risk-register.md
    - chmod +x scripts/security/check-secrets.sh scripts/security/check-tracked-sensitive-files.sh
