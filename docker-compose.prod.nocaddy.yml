# Shared-server overlay: no dedicated Caddy (ports 80/443 already in use).
# App reachable on localhost:3001 for server-side smoke tests.
# Optional: attach to existing reverse proxy network (set SHARED_PROXY_NETWORK).
#
# Usage:
#   docker compose -f docker-compose.prod.yml -f docker-compose.prod.nocaddy.yml \
#     --env-file .env.production up -d --build

services:
  app:
    ports:
      - "127.0.0.1:3001:3000"
    networks:
      - amanah_internal
      - shared_proxy

networks:
  shared_proxy:
    external: true
    name: ${SHARED_PROXY_NETWORK:-gemeinsam1-prod_internal}
